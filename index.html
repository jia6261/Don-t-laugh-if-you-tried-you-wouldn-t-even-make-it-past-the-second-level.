<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你永远过不了第二关 - 游戏大厅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Microsoft YaHei', sans-serif; }
        .game-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #0f172a;
            border: 1px solid #1e293b;
        }
        .game-card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: #22d3ee;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(34, 211, 238, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="text-center mb-16">
        <h1 id="main-title" class="text-6xl font-black tracking-tighter mb-4 cursor-pointer select-none transition-colors">挑战合集</h1>
        <p class="text-cyan-400 font-mono text-sm tracking-[0.3em]">GITHUB 开源版本 v2.1</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl w-full">
        <!-- 迷宫 -->
        <a href="maze.html" class="game-card p-8 rounded-3xl text-center group">
            <div class="text-5xl mb-6 group-hover:scale-110 transition-transform">🌀</div>
            <h2 class="text-2xl font-bold mb-2">经典迷宫</h2>
            <p class="text-slate-500 text-sm">墙壁是活的，终点是会跑的。</p>
        </a>

        <!-- 躲避 -->
        <a href="dodge.html" class="game-card p-8 rounded-3xl text-center group">
            <div class="text-5xl mb-6 group-hover:scale-110 transition-transform">🚀</div>
            <h2 class="text-2xl font-bold mb-2">极限躲避</h2>
            <p class="text-slate-500 text-sm">子弹拥有记忆，走位需谨慎。</p>
        </a>

        <!-- 地板 -->
        <a href="floor.html" class="game-card p-8 rounded-3xl text-center group">
            <div class="text-5xl mb-6 group-hover:scale-110 transition-transform">🧱</div>
            <h2 class="text-2xl font-bold mb-2">虚假地板</h2>
            <p class="text-slate-500 text-sm">蓝灯行，红灯停，简单吗？</p>
        </a>
    </div>

    <div id="dev-toast" class="fixed bottom-10 bg-cyan-500 text-black px-6 py-2 rounded-full font-bold opacity-0 transition-opacity pointer-events-none">
        开发者模式已激活 (无敌)
    </div>

    <script>
        let clicks = 0;
        const title = document.getElementById('main-title');
        const toast = document.getElementById('dev-toast');

        // 检查初始状态
        if(localStorage.getItem('devMode') === 'true') {
            title.classList.add('text-cyan-400');
        }

        title.onclick = () => {
            clicks++;
            if (clicks >= 10) {
                const isDev = localStorage.getItem('devMode') === 'true';
                localStorage.setItem('devMode', !isDev);
                title.classList.toggle('text-cyan-400');
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 2000);
                clicks = 0;
            }
        };
    </script>
</body>
</html>
