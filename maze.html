<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>经典迷宫 - 你永远过不了第二关</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: white; font-family: sans-serif; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <button onclick="location.href='index.html'" class="fixed top-5 left-5 z-10 bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full text-xs transition-all">← 返回大厅</button>
    <div class="fixed top-5 right-5 text-right pointer-events-none">
        <h1 class="text-3xl font-black italic">LEVEL <span id="lvl" class="text-cyan-400">1</span></h1>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let level = 1, frame = 0;
        const player = { x: 50, y: 50, w: 20, h: 20, speed: 5 };
        const keys = {};
        const isDev = localStorage.getItem('devMode') === 'true';

        let obstacles = [
            { x: 200, y: 0, w: 30, h: 450 },
            { x: 400, y: 150, w: 30, h: 450 },
            { x: 600, y: 0, w: 30, h: 450 }
        ];
        let goal = { x: 740, y: 540, w: 40, h: 40 };

        function init() {
            canvas.width = 800; canvas.height = 600;
            const scale = Math.min(window.innerWidth/800, window.innerHeight/600);
            canvas.style.width = (800 * scale) + 'px';
            canvas.style.height = (600 * scale) + 'px';
        }

        function draw() {
            ctx.fillStyle = '#020617'; ctx.fillRect(0, 0, 800, 600);
            frame++;

            // 绘制终点
            ctx.fillStyle = '#10b981'; ctx.shadowBlur = 20; ctx.shadowColor = '#10b981';
            ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
            ctx.shadowBlur = 0;

            // 绘制障碍
            ctx.fillStyle = '#1e293b';
            obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

            // 第二关变态逻辑：终点会跑
            if (level === 2) {
                const dist = Math.hypot(player.x - goal.x, player.y - goal.y);
                if (dist < 250) {
                    goal.x -= (player.x - goal.x) / dist * 6;
                    goal.y -= (player.y - goal.y) / dist * 6;
                    goal.x = Math.max(50, Math.min(750, goal.x));
                    goal.y = Math.max(50, Math.min(550, goal.y));
                }
                ctx.strokeStyle = `rgba(244, 63, 94, ${0.2 + Math.sin(frame/5)*0.1})`;
                ctx.lineWidth = 10; ctx.strokeRect(0, 0, 800, 600);
            }

            // 移动控制
            let nx = player.x, ny = player.y;
            if (keys['w']) ny -= player.speed; if (keys['s']) ny += player.speed;
            if (keys['a']) nx -= player.speed; if (keys['d']) nx += player.speed;
            
            // 碰撞检测
            let canMove = true;
            obstacles.forEach(o => {
                if (nx < o.x + o.w && nx + player.w > o.x && ny < o.y + o.h && ny + player.h > o.y) {
                    if (!isDev) canMove = false;
                }
            });

            if (canMove) {
                player.x = Math.max(0, Math.min(780, nx));
                player.y = Math.max(0, Math.min(580, ny));
            }

            // 过关
            if (player.x < goal.x + goal.w && player.x + player.w > goal.x && player.y < goal.y + goal.h && player.y + player.h > goal.y) {
                if (level === 1) {
                    level = 2; player.x = 50; player.y = 50;
                    document.getElementById('lvl').innerText = "2";
                } else {
                    alert("不...这不可能！你通过了第二关！");
                    location.href = 'index.html';
                }
            }

            // 绘制玩家
            ctx.fillStyle = isDev ? '#fbbf24' : '#22d3ee';
            ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.shadowBlur = 0;

            requestAnimationFrame(draw);
        }

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        window.onresize = init; init(); draw();
    </script>
</body>
</html>
